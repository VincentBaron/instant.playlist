# Local dev database only. Production uses Fly Managed Postgres (just swap DATABASE_URL).
# Port 5434 on the host to avoid clashing with any default :5432 Postgres.
services:
  db:
    image: postgres:16-alpine
    container_name: instant-playlist-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instant_playlist
    ports:
      - "5434:5432"
    volumes:
      - instant-playlist-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instant_playlist"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  instant-playlist-db:
